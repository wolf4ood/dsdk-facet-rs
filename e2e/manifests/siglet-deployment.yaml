---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siglet
  namespace: vault-e2e-test
  labels:
    app: siglet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: siglet
  template:
    metadata:
      labels:
        app: siglet
    spec:
      serviceAccountName: siglet-sa
      volumes:
      - name: vault-secrets
        emptyDir: {}
      - name: vault-agent-config
        configMap:
          name: vault-agent-config-siglet
          items:
          - key: vault-agent-config.hcl
            path: vault-agent-config.hcl
      - name: siglet-config
        configMap:
          name: siglet-config
      containers:
      - name: siglet
        image: siglet:local
        imagePullPolicy: Never
        command:
        - 'sh'
        - '-c'
        - |
          echo "Waiting for Vault token..."
          while [ ! -f /vault/secrets/.vault-token ]; do
            sleep 1
          done
          echo "Vault token available, starting Siglet..."
          exec /usr/local/bin/siglet
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: signaling
          containerPort: 8081
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info,siglet=debug"
        - name: SIGLET_SIGLET_API_PORT
          value: "8080"
        - name: SIGLET_SIGNALING_PORT
          value: "8081"
        - name: SIGLET_CONFIG_FILE
          value: "/config/siglet.toml"
        - name: SIGLET_VAULT_URL
          value: "http://vault:8200"
        - name: SIGLET_VAULT_TOKEN_FILE
          value: "/vault/secrets/.vault-token"
        - name: SIGLET_VAULT_SIGNING_KEY_NAME
          value: "siglet-signing-key"
        - name: SIGLET_TOKEN_ISSUER
          value: "siglet-e2e"
        - name: SIGLET_TOKEN_REFRESH_ENDPOINT
          value: "http://siglet:8080/token/refresh"
        volumeMounts:
        - name: siglet-config
          mountPath: /config
          readOnly: true
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      # Vault Agent sidecar
      - name: vault-agent
        image: hashicorp/vault:1.15.0
        args:
        - "agent"
        - "-config=/vault/config/vault-agent-config.hcl"
        - "-log-level=info"
        env:
        - name: VAULT_ADDR
          value: "http://vault:8200"
        volumeMounts:
        - name: vault-agent-config
          mountPath: /vault/config
        - name: vault-secrets
          mountPath: /vault/secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      restartPolicy: Always